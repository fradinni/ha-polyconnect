name: "Polyconnect Bridge"
version: "2.2.0"
slug: "polyconnect_bridge"
description: "Playwright bridge with native login for Polyconnect / Ingeli pool heat pumps."
url: "https://github.com/fradinni/ha-polyconnect"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
ingress: true
ingress_port: 8765
ports:
  8765/tcp: null
ports_description:
  8765/tcp: "Bridge API (HA ingress)"
options:
  log_level: "info"
  email: ""
  password: ""
schema:
  log_level: "list(trace|debug|info|warning|error)"
  email: "email?"
  password: "password?"
environment:
  PYTHONUNBUFFERED: "1"
map:
  - data:rw
