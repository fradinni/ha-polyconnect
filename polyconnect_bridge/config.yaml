name: "Polyconnect Bridge"
version: "2.0.2"
slug: "polyconnect_bridge"
description: "Playwright bridge + credential capture for Polyconnect / Ingeli pool heat pumps."
url: "https://github.com/fradinni/ha-polyconnect"
arch:
  - amd64
  - aarch64
startup: services
boot: manual
ingress: true
ingress_port: 8765
ports:
  8765/tcp: null
  8080/tcp: 8080
  8888/tcp: 8888
ports_description:
  8765/tcp: "Bridge API (HA ingress)"
  8080/tcp: "Setup UI (phone access during capture)"
  8888/tcp: "MITM proxy (phone traffic during capture)"
options:
  log_level: "info"
schema:
  log_level: "list(trace|debug|info|warning|error)"
environment:
  PYTHONUNBUFFERED: "1"
map:
  - data:rw
